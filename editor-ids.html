<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editor de IDs e Status — Florescer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;height:100vh;width:100vw}
#map-container{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:grab;padding-top:52px}
#map-container.grabbing{cursor:grabbing}
.lote{stroke:rgba(255,255,255,.5);stroke-width:.8;cursor:pointer;fill-opacity:.45}
.lote:hover{stroke:#fff;stroke-width:1.6;fill-opacity:.65}
.lote.selected{stroke:#facc15;stroke-width:2.5;fill-opacity:.75}
.sts-1{fill:#22c55e}.sts-2{fill:#ef4444}.sts-3{fill:#eab308}.sts-4{fill:#f97316}.sts-5{fill:#3b82f6}
.lot-label{font-size:6.5px;fill:#fff;font-weight:700;pointer-events:none;paint-order:stroke;stroke:#000;stroke-width:2px;stroke-linejoin:round}
/* toolbar */
#toolbar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(15,17,23,.97);border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;padding:0 14px;z-index:300}
#toolbar h2{color:#f1f5f9;font-size:13px;white-space:nowrap}
.sep{width:1px;height:28px;background:rgba(255,255,255,.15)}
.tb-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#f1f5f9;padding:6px 13px;border-radius:7px;font-size:12px;cursor:pointer;white-space:nowrap}
.tb-btn:hover{background:rgba(255,255,255,.18)}
.tb-btn.save{background:#16a34a;border-color:#22c55e}
.tb-btn.export{background:#7c3aed;border-color:#8b5cf6}
#tb-info{margin-left:auto;color:#94a3b8;font-size:12px}
#tb-info strong{color:#facc15}
/* side panel */
#side{position:fixed;top:52px;right:0;width:290px;bottom:0;background:rgba(15,17,23,.97);border-left:1px solid rgba(255,255,255,.1);z-index:200;padding:18px;display:none;overflow-y:auto}
#side.open{display:block}
#side h3{color:#f1f5f9;font-size:15px;margin-bottom:14px}
.field{margin-bottom:14px}
.field label{display:block;color:#94a3b8;font-size:11px;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.id-row{display:flex;gap:8px}
.id-row select,.id-row input{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:#f1f5f9;padding:8px 10px;border-radius:8px;font-size:14px;font-weight:600}
.id-row select{flex:1;cursor:pointer}
.id-row input{width:68px;text-align:center}
.id-row select:focus,.id-row input:focus{outline:none;border-color:#3b82f6}
#id-preview{font-size:26px;font-weight:800;color:#facc15;text-align:center;padding:10px;background:rgba(250,204,21,.1);border-radius:8px;margin-bottom:14px;letter-spacing:1px}
.sts-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sts-opt{display:flex;align-items:center;gap:7px;cursor:pointer;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.1)}
.sts-opt:hover{background:rgba(255,255,255,.08)}
.sts-opt.active{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3)}
.sts-opt input{display:none}
.sdot{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.sts-opt span{font-size:12px;color:#e2e8f0}
.apply-btn{width:100%;margin-top:16px;padding:12px;background:#2563eb;border:none;color:#fff;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.apply-btn:hover{background:#1d4ed8}
#warn{display:none;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:8px;padding:9px;color:#fca5a5;font-size:12px;margin-bottom:12px}
#warn.show{display:block}
#log{margin-top:16px;border-top:1px solid rgba(255,255,255,.1);padding-top:14px}
#log h4{color:#94a3b8;font-size:11px;text-transform:uppercase;margin-bottom:7px}
#log-list{list-style:none}
#log-list li{font-size:11px;color:#86efac;font-family:monospace;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)}
/* legend */
#legend{position:fixed;top:64px;left:12px;background:rgba(15,17,23,.88);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;z-index:100}
#legend h3{font-size:11px;color:#64748b;text-transform:uppercase;margin-bottom:6px}
.leg{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;color:#cbd5e1}
.ldot{width:11px;height:11px;border-radius:2px}
/* controls */
#ctrls{position:fixed;bottom:12px;left:12px;display:flex;gap:8px;z-index:200}
.ctrl{background:rgba(15,17,23,.88);border:1px solid rgba(255,255,255,.18);color:#fff;width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ctrl:hover{background:rgba(255,255,255,.15)}
#coords{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:rgba(255,255,255,.4);font-size:10px;padding:3px 8px;border-radius:4px;z-index:200;pointer-events:none;font-family:monospace}
#banner{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:rgba(37,99,235,.9);color:#fff;padding:7px 18px;border-radius:20px;font-size:12px;z-index:150;pointer-events:none}
</style>
</head>
<body>
<div id="toolbar">
  <h2>🏷️ Editor de IDs e Status</h2>
  <div class="sep"></div>
  <button class="tb-btn save" id="btn-save">💾 Salvar editor</button>
  <button class="tb-btn export" id="btn-export">⬇ Exportar mapa</button>
  <div id="tb-info">Clique num lote para editar ID e status</div>
</div>
<div id="banner">Clique em qualquer lote para editar seu ID e status</div>
<div id="legend">
  <h3>Status</h3>
  <div class="leg"><div class="ldot" style="background:#22c55e"></div>Livre</div>
  <div class="leg"><div class="ldot" style="background:#ef4444"></div>Vendido</div>
  <div class="leg"><div class="ldot" style="background:#eab308"></div>Reservado</div>
  <div class="leg"><div class="ldot" style="background:#f97316"></div>Não Disponível</div>
  <div class="leg"><div class="ldot" style="background:#3b82f6"></div>Projeto</div>
</div>
<div id="side">
  <h3>Editar Lote</h3>
  <div id="warn"></div>
  <div class="field">
    <label>Quadra + Número</label>
    <div class="id-row">
      <select id="sel-q"><option value="A">A</option>
<option value="B">B</option>
<option value="C">C</option>
<option value="D">D</option>
<option value="E">E</option>
<option value="F">F</option>
<option value="G">G</option>
<option value="H">H</option>
<option value="I">I</option>
<option value="J">J</option>
<option value="K">K</option>
<option value="O">O</option></select>
      <input type="number" id="inp-n" min="1" max="99" value="1">
    </div>
  </div>
  <div id="id-preview">—</div>
  <div class="field">
    <label>Status</label>
    <div class="sts-grid">
      <label class="sts-opt active" data-val="Livre">
        <input type="radio" name="sts" value="Livre" checked>
        <div class="sdot" style="background:#22c55e"></div><span>Livre</span>
      </label>
      <label class="sts-opt" data-val="Vendido">
        <input type="radio" name="sts" value="Vendido">
        <div class="sdot" style="background:#ef4444"></div><span>Vendido</span>
      </label>
      <label class="sts-opt" data-val="Reservado">
        <input type="radio" name="sts" value="Reservado">
        <div class="sdot" style="background:#eab308"></div><span>Reservado</span>
      </label>
      <label class="sts-opt" data-val="Não Disponível">
        <input type="radio" name="sts" value="Não Disponível">
        <div class="sdot" style="background:#f97316"></div><span>Não Disponível</span>
      </label>
      <label class="sts-opt" data-val="Projeto" style="grid-column:1/-1">
        <input type="radio" name="sts" value="Projeto">
        <div class="sdot" style="background:#3b82f6"></div><span>Projeto</span>
      </label>
    </div>
  </div>
  <button class="apply-btn" id="btn-apply">✓ Aplicar</button>
  <div id="log"><h4>Histórico (0)</h4><ul id="log-list"></ul></div>
</div>
<div id="map-container">
  <svg id="svg-root" viewBox="0 0 1920 1080" width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
    <image href="mapa-bg.png" x="0" y="0" width="1920" height="1080"/>
    <g id="lots-layer"></g>
  </svg>
</div>
<div id="coords">x:0 y:0</div>
<div id="ctrls">
  <button class="ctrl" id="btn-zi">+</button>
  <button class="ctrl" id="btn-zo">−</button>
  <button class="ctrl" id="btn-rst" style="font-size:13px">⌂</button>
</div>

const STS = {'Livre':1,'Vendido':2,'Reservado':3,'Não Disponível':4,'Projeto':5};
const lots = {};
for(const[id,d]of Object.entries(INITIAL_LOTS)) lots[id]={...d,pts:d.pts.map(p=>[...p])};
const history = [];

function ptsStr(pts){return pts.map(p=>p[0].toFixed(2)+','+p[1].toFixed(2)).join(' ');}
function centroid(pts){const n=pts.length;let sx=0,sy=0;for(const[x,y]of pts){sx+=x;sy+=y;}return[sx/n,sy/n];}

// ── SVG render ────────────────────────────────────────────────────────────
const lotsG=document.getElementById('lots-layer');
function renderAll(){
  lotsG.innerHTML='';
  for(const[id,d]of Object.entries(lots)){
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('class',`lote sts-${d.sts}`);
    poly.setAttribute('points',ptsStr(d.pts));
    poly.dataset.id=id; lotsG.appendChild(poly);
    const[cx,cy]=d.centroid||centroid(d.pts);
    const m=id.match(/^([A-Z]+)(\d+)$/); const num=m?m[2]:id;
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('class','lot-label'); txt.setAttribute('x',cx.toFixed(1)); txt.setAttribute('y',cy.toFixed(1));
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','central');
    txt.dataset.id=id; txt.textContent=num; lotsG.appendChild(txt);
  }
}
renderAll();

// ── Panzoom ───────────────────────────────────────────────────────────────
const svgEl=document.getElementById('svg-root');
const pz=Panzoom(svgEl,{maxScale:14,minScale:0.25,step:0.3,canvas:true});
document.getElementById('map-container').addEventListener('wheel',e=>{e.preventDefault();pz.zoomWithWheel(e);},{passive:false});
document.getElementById('btn-zi').onclick=()=>pz.zoomIn();
document.getElementById('btn-zo').onclick=()=>pz.zoomOut();
document.getElementById('btn-rst').onclick=()=>{const s=Math.min(window.innerWidth/1920,(window.innerHeight-52)/1080)*.9;pz.zoom(s,{animate:true});pz.pan(0,0,{animate:true});};
const cont=document.getElementById('map-container');
svgEl.addEventListener('mousedown',()=>cont.classList.add('grabbing'));
document.addEventListener('mouseup',()=>cont.classList.remove('grabbing'));
svgEl.addEventListener('mousemove',e=>{const pt=svgEl.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;const sp=pt.matrixTransform(svgEl.getScreenCTM().inverse());document.getElementById('coords').textContent=`x:${Math.round(sp.x)} y:${Math.round(sp.y)}`;});

// ── Selection ─────────────────────────────────────────────────────────────
let selectedId=null;
lotsG.addEventListener('click',e=>{
  const p=e.target.closest('.lote'); if(!p)return;
  e.stopPropagation(); selectLot(p.dataset.id);
});
function selectLot(id){
  document.querySelectorAll('.lote.selected').forEach(el=>el.classList.remove('selected'));
  selectedId=id;
  document.querySelectorAll(`[data-id="${id}"].lote`).forEach(el=>el.classList.add('selected'));
  document.getElementById('tb-info').innerHTML=`Editando: <strong>${id}</strong> — ${lots[id].status}`;
  document.getElementById('banner').style.display='none';
  const m=id.match(/^([A-Z]+)(\d+)$/);
  if(m){document.getElementById('sel-q').value=m[1];document.getElementById('inp-n').value=parseInt(m[2]);}
  updatePreview();
  document.querySelectorAll('.sts-opt').forEach(o=>o.classList.remove('active'));
  const r=document.querySelector(`input[name="sts"][value="${lots[id].status}"]`);
  if(r){r.checked=true;r.closest('.sts-opt').classList.add('active');}
  document.getElementById('side').classList.add('open');
  checkConflict();
}

// ── ID preview ────────────────────────────────────────────────────────────
function getNewId(){const q=document.getElementById('sel-q').value;const n=String(document.getElementById('inp-n').value).padStart(2,'0');return q+n;}
function updatePreview(){document.getElementById('id-preview').textContent=getNewId();checkConflict();}
function checkConflict(){
  if(!selectedId)return;
  const nid=getNewId(), exists=nid!==selectedId&&lots[nid];
  const w=document.getElementById('warn');
  if(exists){w.textContent=`⚠️ "${nid}" já existe — os dois lotes trocarão de ID.`;w.classList.add('show');}
  else{w.classList.remove('show');}
}
document.getElementById('sel-q').addEventListener('change',updatePreview);
document.getElementById('inp-n').addEventListener('input',updatePreview);
document.querySelectorAll('.sts-opt').forEach(o=>{
  o.addEventListener('click',()=>{document.querySelectorAll('.sts-opt').forEach(x=>x.classList.remove('active'));o.classList.add('active');o.querySelector('input').checked=true;});
});

// ── Apply ─────────────────────────────────────────────────────────────────
document.getElementById('btn-apply').addEventListener('click',()=>{
  if(!selectedId)return;
  const oldId=selectedId, newId=getNewId();
  const newSts=document.querySelector('input[name="sts"]:checked').value;
  const newStsN=STS[newSts], oldSts=lots[oldId].status;
  if(newId!==oldId&&lots[newId]){
    // swap
    const tmp={pts:lots[newId].pts,centroid:lots[newId].centroid,area:lots[newId].area,quadra:lots[newId].quadra};
    lots[newId]={...lots[oldId],id:newId,status:newSts,sts:newStsN};
    lots[oldId]={...lots[oldId],pts:tmp.pts,centroid:tmp.centroid,area:tmp.area,quadra:tmp.quadra,id:oldId};
    history.push(`SWAP ${oldId} ↔ ${newId} | status: ${newSts}`);
  } else if(newId!==oldId){
    const m=newId.match(/^([A-Z]+)/);
    lots[newId]={...lots[oldId],id:newId,status:newSts,sts:newStsN,quadra:m?m[1]:lots[oldId].quadra};
    delete lots[oldId];
    history.push(`${oldId} → ${newId} | status: ${newSts}`);
  } else {
    lots[oldId].status=newSts; lots[oldId].sts=newStsN;
    if(oldSts!==newSts) history.push(`${oldId}: ${oldSts} → ${newSts}`);
  }
  renderAll(); updateLog();
  setTimeout(()=>selectLot(newId),30);
});
function updateLog(){
  const ul=document.getElementById('log-list'); ul.innerHTML='';
  [...history].reverse().slice(0,25).forEach(c=>{const li=document.createElement('li');li.textContent=c;ul.appendChild(li);});
  document.querySelector('#log h4').textContent=`Histórico (${history.length})`;
}

  for (const [id, d] of Object.entries(lotsObj)) {
    const ps = d.pts.map(p => p[0].toFixed(2)+','+p[1].toFixed(2)).join(' ');

    const m = id.match(/^([A-Z]+)(\d+)$/);
    const num = m ? m[2] : id;
    svgEls.push(
      `<polygon class="lote sts-${d.sts}" data-id="${id}" data-status="${d.status}" data-area="${d.area}" data-quadra="${d.quadra}" points="${ps}"/>`,
      `<text class="lot-label" x="${cx.toFixed(1)}" y="${cy.toFixed(1)}" text-anchor="middle" dominant-baseline="central">${num}</text>`
    );
  }
  const svgContent = svgEls.join('\n    ');
  const lotsJS = JSON.stringify(lotsObj);
  return `<!DOCTYPE html>

// ── File System Access API for self-save ────────────────────────────────────
let fileHandle = null;

async function pickSelfFile(suggestedName) {
  try {
    [fileHandle] = await window.showOpenFilePicker({
      types: [{ description: 'HTML', accept: { 'text/html': ['.html'] } }],
      multiple: false
    });
    return true;
  } catch(e) { return false; }
}

async function saveToFile(content, filename) {
  // Try File System Access API first
  if (window.showSaveFilePicker) {
    try {
      const fh = fileHandle || await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: 'HTML', accept: { 'text/html': ['.html'] } }]
      });
      fileHandle = fh;
      const writable = await fh.createWritable();
      await writable.write(content);
      await writable.close();
      return 'saved';
    } catch(e) {
      if (e.name === 'AbortError') return 'cancelled';
      // Fall through to download
    }
  }
  // Fallback: download
  const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  return 'downloaded';
}

function showToast(msg, color='#16a34a') {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.style.cssText = `position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:${color};color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;transition:opacity .4s`;
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.style.opacity='0'; }, 2500);
}


// ── Save self ─────────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', async ()=>{
  const html = buildSelfHTML();
  const result = await saveToFile(html, 'editor-ids.html');
  if(result==='saved') showToast('✓ Editor salvo com os dados atuais!');
  else if(result==='downloaded') showToast('⬇ Baixado — substitua o arquivo original', '#2563eb');
});

document.getElementById('btn-export').addEventListener('click', async ()=>{

  if(result==='saved') showToast('✓ Mapa exportado e salvo!');
  else if(result==='downloaded') showToast('⬇ Mapa exportado!', '#7c3aed');
});

// ── Build self HTML ───────────────────────────────────────────────────────
function buildSelfHTML(){
  const src = document.documentElement.outerHTML;
  const newJson = JSON.stringify(lots);
  return src.replace(/const INITIAL_LOTS\s*=\s*\{[\s\S]*?\};/, `const INITIAL_LOTS = ${newJson};`);
}
