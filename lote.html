<style>
:root {
  --purple:    #5B2166;
  --purple-dk: #3E1647;
  --purple-lt: #7A3A8A;
  --gold:      #C4A550;
  --gold-lt:   #D4BB75;
  --beige:     #E8E3D5;
  --beige-dk:  #D8D0BE;
  --beige-lt:  #F2EEE4;
  --text:      #2C1840;
  --green:     #25D366;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body {
  font-family: 'Raleway', 'Segoe UI', Arial, sans-serif;
  background: var(--beige);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  width: 100%;
  background: linear-gradient(135deg, var(--purple-dk) 0%, var(--purple) 60%, var(--purple-lt) 100%);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 2px 16px rgba(91,33,102,.35);
}
header img {
  width: 58px; height: 58px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  object-fit: cover;
  background: var(--beige-lt);
  flex-shrink: 0;
}
.hdr-text .name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 3px;
  color: var(--beige-lt);
  text-transform: uppercase;
  line-height: 1.1;
}
.hdr-text .sub {
  font-size: 11px;
  letter-spacing: 2.5px;
  color: var(--gold-lt);
  text-transform: uppercase;
}

.card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 6px 32px rgba(91,33,102,.13);
  margin: 28px 16px;
  padding: 32px 28px 28px;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.lot-label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 4px;
}
.lot-id {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 68px;
  color: var(--purple);
  letter-spacing: 5px;
  line-height: 1;
  margin-bottom: 10px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.info-box {
  background: var(--beige-lt);
  border-radius: 12px;
  padding: 14px 10px;
}
.info-box .label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 4px;
}
.info-box .value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--purple);
  letter-spacing: 1px;
  line-height: 1.1;
}
.info-box.full { grid-column: 1 / -1; }

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.status-badge::before {
  content: '';
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: currentColor;
  opacity: .6;
}
.sts-1 { background: #d4edda; color: #155724; }
.sts-2 { background: #f8d7da; color: #721c24; }
.sts-3 { background: #fff3cd; color: #856404; }
.sts-4 { background: #ffe5cc; color: #8a3e00; }
.sts-5 { background: #e7d9f3; color: #4a1766; }

hr.divider {
  border: none;
  border-top: 1px solid var(--beige-dk);
  margin: 22px 0;
}

.cta-text {
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
  margin-bottom: 16px;
  line-height: 1.5;
  opacity: .8;
}

.whatsapp-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 16px 20px;
  background: var(--green);
  color: #fff;
  border-radius: 14px;
  font-family: 'Raleway', sans-serif;
  font-size: 16px;
  font-weight: 700;
  text-decoration: none;
  transition: background .15s, transform .1s;
  box-shadow: 0 4px 16px rgba(37,211,102,.3);
}
.whatsapp-btn:hover  { background: #1ebe5a; }
.whatsapp-btn:active { transform: scale(.98); }
.whatsapp-btn svg { width: 24px; height: 24px; flex-shrink: 0; }

.map-link {

  margin-top: 16px;
  font-size: 13px;
  color: var(--purple);
  font-weight: 600;
  text-decoration: none;
  opacity: .75;
}
.map-link:hover { opacity: 1; text-decoration: underline; }

  line-height: 1.7;
}
#not-found a { color: var(--purple); font-weight: 600; }

function fmtArea(a) {
  return a.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + ' m²';
}

function updateBadge(status, sts) {

  b.className   = `status-badge sts-${sts}`;
}

  document.getElementById('lot-id').textContent    = lot.id;
  document.getElementById('info-quadra').textContent = lot.q;
  document.getElementById('info-area').textContent   = fmtArea(lot.a);
  updateBadge(lot.s, lot.sts);

  const msg = encodeURIComponent(`Olá! Tenho interesse no terreno ${lot.id} do Florescer Parque Residencial. Poderia me passar mais informações?`);
  document.getElementById('whatsapp-btn').href = `https://wa.me/${PHONE}?text=${msg}`;
}

// ── Sync status em tempo real com Google Sheets ────────────────────────
function normKey(s) {
  return (s||'').toString().toLowerCase().trim()
    .replace(/[áàâã]/g,'a').replace(/[éèê]/g,'e')
    .replace(/[íì]/g,'i').replace(/[óòôõ]/g,'o')
    .replace(/[úù]/g,'u').replace(/ç/g,'c');
}
function parseCSV(text) {
  const rows=[]; let cur=[],field='',q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"')q=false;else field+=c;}
    else{if(c==='"')q=true;else if(c===','){cur.push(field);field='';}else if(c==='\n'){cur.push(field);rows.push(cur);cur=[];field='';}else if(c!=='\r')field+=c;}
  }
  if(field.length||cur.length){cur.push(field);rows.push(cur);}
  return rows;
}

async function syncStatus() {
  if (!lot) return;
  try {
    const res = await fetch(SHEET_URL, { cache: 'no-store' });
    if (!res.ok) return;
    const rows = parseCSV(await res.text()).filter(r => r.some(c => c && c.trim()));
    if (rows.length < 2) return;
    const header = rows[0].map(normKey);
    const ci = {};
    header.forEach((h,i) => {
      if (/^id$|lote|codigo|cod$/.test(h) && ci.id==null) ci.id=i;
      if (/quadra|bloco/.test(h)) ci.quadra=i;
      if (/^num|^n$|numero|n[°º]/.test(h)) ci.numero=i;
      if (/status|situacao/.test(h)) ci.status=i;
      if (/area|m2|m²|metragem/.test(h)) ci.area=i;
    });
    for (let r=1; r<rows.length; r++) {
      const row = rows[r];
      let lid = null;
      if (ci.id!=null && row[ci.id]) lid = row[ci.id].toString().trim().toUpperCase();
      else if (ci.quadra!=null && ci.numero!=null) {
        const q = (row[ci.quadra]||'').toString().trim().toUpperCase();
        const n = (row[ci.numero]||'').toString().trim().replace(/\D/g,'').padStart(2,'0');
        if (q&&n) lid = q+n;
      }
      if (lid !== rawId) continue;
      if (ci.status!=null) {
        const st = STATUS_MAP[normKey(row[ci.status])];
        if (st) { lot.s=st; lot.sts=STS_NUM[st]; }
      }
      if (ci.area!=null) {
        const a = parseFloat((row[ci.area]||'').toString().replace(/\./g,'').replace(',','.'));
        if (!isNaN(a) && a>0) lot.a=a;
      }
      renderLot(lot);
      break;
    }
  } catch {}
}

if (lot) syncStatus();
</script>
</body>
</html>
